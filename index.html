<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>Hotel Vedha | Authentic Local Experience</title>
    <meta name="title" content="Hotel Vedha | Authentic Local Experience" />
    <meta name="description" content="Experience the authentic taste and ambiance at Hotel Vedha. Discover our menu, gallery, and contact us to book your unforgettable visit today." />
    <meta name="keywords" content="Hotel Vedha, Restaurant, Authentic Cuisine, Fine Dining, Hotel, Menu, Booking" />
    <meta name="author" content="Hotel Vedha" />
    <meta name="robots" content="index, follow" />
    
    <!-- Canonical Link -->
    <link rel="canonical" href="https://hotelvedha.com/" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://hotelvedha.com/" />
    <meta property="og:title" content="Hotel Vedha | Authentic Local Experience" />
    <meta property="og:description" content="Experience the authentic taste and ambiance at Hotel Vedha. Discover our menu, gallery, and contact us to book your unforgettable visit today." />
    <meta property="og:image" content="https://hotelvedha.com/favicon.png" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://hotelvedha.com/" />
    <meta property="twitter:title" content="Hotel Vedha | Authentic Local Experience" />
    <meta property="twitter:description" content="Experience the authentic taste and ambiance at Hotel Vedha. Discover our menu, gallery, and contact us to book your unforgettable visit today." />
    <meta property="twitter:image" content="https://hotelvedha.com/favicon.png" />

    <!-- Google Site Verification Placeholder -->
    <!-- Replace 'YOUR_VERIFICATION_STRING' with the actual code from Google Search Console -->
    <!-- <meta name="google-site-verification" content="YOUR_VERIFICATION_STRING" /> -->

    <!-- Favicon / Logo -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!-- Structured Data for Logo in Google Search -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Restaurant",
        "name": "Hotel Vedha",
        "url": "https://hotelvedha.com/",
        "logo": "https://hotelvedha.com/favicon.png",
        "image": "https://hotelvedha.com/favicon.png"
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
